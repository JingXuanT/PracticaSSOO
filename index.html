<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
<style>
        /* El fondo oscuro que cubre toda la pantalla */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        /* El cuadro blanco (el menú) */
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        /* Botones del menú */
        .btn-modal {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            color: white;
        }

        .btn-crear { background-color: black; }
        .btn-unirse { background-color: blue; }

        /* Input del código */
        .input-join {
            width: 90%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        /* Botón cerrar (la 'X') */
        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 20px;
            cursor: pointer;
            color: #aaa;
            text-decoration: none;
        }
    </style>

</head>
<body style="background-color: #e0f7e8; font-family: 'Verdana'; text-align: center;">

        <div class="modal-content">

            <h2 style="margin-top:0; color: red;">STOP</h2>
            
            <button onclick="crearPartida()" class="btn-modal btn-crear">

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <input type="text" id="join-code" placeholder="Código (ej: 1234)" class="input-join">
            <button onclick="unirsePartida()" class="btn-modal btn-unirse">
                🔗 UNIRSE
            </button>
        </div>
    </div>
