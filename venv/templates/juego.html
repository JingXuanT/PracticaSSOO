<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego STOP - Partida {{ game_id }}</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        .bloqueado { background-color: #ffcccc; cursor: not-allowed; }
        .actualizado { background-color: #ccffcc; border: 2px solid #4CAF50; }
        input { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #ccc; }
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>Partida: {{ game_id }}</h1>
    <div id="status">Conectando...</div>
   
    <div style="background-color: #f0f8ff; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <button id="btn-empezar" onclick="empezarJuego()" style="padding: 10px 20px; font-size: 18px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px;">
            ¡GO!
        </button>
        <h2 id="mi-identidad" style="color: #4CAF50;">Identificando jugador...</h2>
	<h2 id="letra-elegida" style="color: #333;">Esperando a que empiece la partida...</h2>
        <h3>👥 Jugadores conectados: <span id="contador-jugadores">0</span></h3>
    </div>

    <hr>
    
    <div id="formulario">
        <p>Nombre: <input type="text" id="nombre" onfocus="bloquear('nombre')" onblur="enviar('nombre')"></p>
        <p>Apellido: <input type="text" id="apellido" onfocus="bloquear('apellido')" onblur="enviar('apellido')"></p>
        <p>Animal: <input type="text" id="animal" onfocus="bloquear('animal')" onblur="enviar('animal')"></p>
        <p>Comida: <input type="text" id="comida" onfocus="bloquear('comida')" onblur="enviar('comida')"></p>
        <p>Color: <input type="text" id="color" onfocus="bloquear('color')" onblur="enviar('color')"></p>
        <p>País: <input type="text" id="pais" onfocus="bloquear('pais')" onblur="enviar('pais')"></p>
        <p>Objeto: <input type="text" id="objeto" onfocus="bloquear('objeto')" onblur="enviar('objeto')"></p>
    </div>

    <script>
        const socket = io(); 
        const room = "{{ game_id }}";
        socket.on('asignar_nombre', (data)=> {
		document.getElementById('mi-identidad').innerText = "Eres el " + data.nombre; });

        function empezarJuego() {
            socket.emit('iniciar_juego', { room: room });
        }

        function bloquear(cat) {
            socket.emit('escribiendo', { room: room, categoria: cat });
        }

        function enviar(cat) {
            const val = document.getElementById(cat).value;
            if (val.trim() !== "") {
                socket.emit('palabra_lista', { room: room, categoria: cat, valor: val });
            }
        }

        socket.on('connect', () => {
            socket.emit('join', { room: room });
            document.getElementById('status').innerText = "Conectado a la partida " + room;
        });

        socket.on('actualizar_jugadores', (data) => {
            document.getElementById('contador-jugadores').innerText = data.cantidad;
        });

        socket.on('juego_iniciado', (data) => {
            document.getElementById('btn-empezar').style.display = 'none';
            document.getElementById('letra-elegida').innerText = "¡LA LETRA ES LA: " + data.letra + "!";
            document.querySelectorAll('input').forEach(i => {
                i.value = "";
                i.disabled = false;
                i.classList.remove('bloqueado', 'actualizado');
            });
        });

        socket.on('bloquear_categoria', (data) => {
            const el = document.getElementById(data.cat);
            if (el && el.value === "") {
                el.disabled = true;
                el.classList.add('bloqueado');
                el.placeholder = "Alguien escribe...";
            }
        });

        socket.on('desbloquear_categoria', (data) => {
            const el = document.getElementById(data.cat);
            if (el && !el.classList.contains('actualizado')) {
                el.disabled = false;
                el.classList.remove('bloqueado');
                el.placeholder = "";
            }
        });

        socket.on('actualizar_tablero', (data) => {
            const el = document.getElementById(data.cat);
            if (el) {
                el.value = data.val;
                el.disabled = true;
                el.classList.remove('bloqueado');
                el.classList.add('actualizado');
            }
            console.log("Palabra aceptada, alguien sumó un punto.");
        });

        socket.on('fin_juego', (data) => {
            let mensaje = data.razon + "\n\nPuntuaciones finales:\n";

            for (let sid in data.puntos) {
		const nombreReal = data.nombres[sid] || "Jugador";  
		mensaje += `${nombreReal}: ${data.puntos[sid]} puntos\n`;
            }
		
            alert(mensaje);
            document.querySelectorAll('input').forEach(i => i.disabled = true);
        });

        socket.on('error', (data) => {
            alert("Error: " + data.msg);
        });
    </script>
</body>
</html>
